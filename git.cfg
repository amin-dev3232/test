git -v دیدن ورژن گیت

ست کردن یوزرنیم و ایمیل
git config --global user.name "amin.sheikhy"
git config --global user.email "aminsheikhy59@gmail.com"

مقدار دهی اولیه کردن
git init

U
وقتی یه فایلی رو به پروژه اضافه میکنیم هنوز داخل ورکینگ دایرکتوری هست یعنی هنوز وارد استیجینگ اریا نشده

U = Untracked
فایل جدیدی که گیت هنوز نمی‌شناسه

M = Modified
فایل قبلاً کامیت شده ولی تغییر کرده

اضافه کردن فایلی به استیجینگ اریا
git add index.html
git add . اضافه کردن همه فایلا
یا داخل همون سورس کنترل از علامت های + یا - استفاده کنی واسه اضافه کردن یا حذف کردن

اضافه کردن فایلا ها و کامیک کردنشون
git commit -m "create basic structure of my project"

وضعیت کامیت های پروژه
git log
git log --oneline یعنی توی یه خط

برای رفت و امد بین کامیت های قبلی
git checkout 928ed23

ولی بهتره از این استفاده شه
git switch --detach 928ed23
git switch main

اگه بخای بری به اخرین تغییرات پروژت باید با این بری
git checkout main/master

برای کپی کردن یک ریپازیتوری گیتهاب داخل فایل های سیستمت
اول وارد ریپازیتوری شو و بعدش قسمت کد یا دانلود کن یا با این کد بیارش داخل وی اس کد خودت
git clone https://github.com/amin-dev3232/test.git

یک ریپازیتوری ریموت اد میکنه
git remote add origin https://github.com/amin-dev3232/test.git

و اگر خالی این رو بزنی بهت میگه به کجا متصلی - اگه متصل نباشی چیزی نمیاره
git remote

پوش کردن تغییرات در داخل گیتهاب
git push -u origin main/master

دفعات بعدی همین کفایت میکنه
git push

وقتی روی یه پروژه چندین نفر کار میکنن با این میتونی اخرین تغییرات رو دریافت کنی
git pull origin main/master

شاخه های گیت رو نشون میده و اینکه روی کدوم شاخه هستیم
git branch

مثلا ساخت برنچ جدید
git branch amin-branch

بخای بین برنچ ها جا به جا شی
git switch amin-branch
git switch master

اگه بخایی برنچی رو با برنچ اصلی ادغام بکنی باید اول بری روی برنچ اصلی
git merge amin-branch